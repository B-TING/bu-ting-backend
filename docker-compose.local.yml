services:
  postgres-local:
    image: postgres:16-alpine
    container_name: postgres_local_container
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
      TZ: Asia/Seoul
    volumes:
      # 변경 전: - postgres_local_data:/var/lib/postgresql/data
      # 변경 후: 현재 폴더(.) 안의 postgres_data 폴더와 동기화
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - local-network

  sonarqube-local:
    image: sonarqube:lts-community
    container_name: sonarqube_local_container
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
      TZ: Asia/Seoul
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - local-network

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  local-network:
    driver: bridge
