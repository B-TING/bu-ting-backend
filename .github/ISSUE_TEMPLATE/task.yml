name: Task / Sub-issue
description: 부모 이슈에 연결할 구체적인 구현 작업을 작성합니다.
title: "feat: "
labels: ["feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 작업 목적
      description: 왜 이 작업이 필요한지 간단히 적어주세요.
      placeholder: 예) OAuth2.0 Provider를 통해 사용자가 로그인할 수 있도록 인증 흐름을 구현한다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 작업 범위
      description: 구현하거나 수정할 내용을 체크리스트로 적어주세요.
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 작업 영역
      description: 가장 가까운 영역을 선택해주세요.
      options:
        - Backend
        - API
        - Security
        - Database
        - Test
        - Infra
        - Docs
        - Other
    validations:
      required: true

  - type: checkboxes
    id: languages
    attributes:
      label: 다국어 지원 대상
      description: 국제화 작업인 경우 지원할 언어를 선택해주세요.
      options:
        - label: 한국어(ko)
        - label: 영어(en)
        - label: 일본어(ja)
        - label: 중국어(zh)

  - type: textarea
    id: api_example
    attributes:
      label: API 예시
      description: 요청/응답 예시가 있다면 적어주세요.
      render: http
      placeholder: |
        GET /api/v1/users/me
        Authorization: Bearer <access-token>

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 완료 조건
      description: 이 이슈가 완료되었다고 판단할 기준을 적어주세요.
      value: |
        - [ ] 기능이 정상 동작한다.
        - [ ] 테스트가 추가되거나 기존 테스트가 통과한다.
        - [ ] 문서 또는 사용 방법이 필요한 경우 함께 갱신한다.
    validations:
      required: true

  - type: textarea
    id: test_plan
    attributes:
      label: 검증 방법
      description: 어떤 명령이나 시나리오로 검증할지 적어주세요.
      value: |
        ```bash
        ./gradlew check
        ```
    validations:
      required: true

  - type: textarea
    id: parent_issue
    attributes:
      label: 부모 이슈
      description: 연결할 부모 이슈 번호가 있다면 적어주세요.
      placeholder: "예) Parent: #12"

  - type: textarea
    id: notes
    attributes:
      label: 참고 사항
      description: 관련 브랜치, PR, 설계 결정, 논의 내용을 적어주세요.
