spring:
  application:
    name: buting-be
  threads:
    virtual:
      enabled: true
  messages:
    basename: messages
    encoding: UTF-8
  jackson:
    time-zone: Asia/Seoul
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_REDIRECT_URI:}
    allowed-audiences: ${GOOGLE_ALLOWED_AUDIENCES:${GOOGLE_AND_DEBUG_CLIENT_ID:},${GOOGLE_AND_RELEASE_CLIENT_ID:}}
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    redirect-uri: ${NAVER_REDIRECT_URI:}
  kakao:
    client-id: ${KAKAO_REST_API_KEY:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:}
    allowed-audiences: ${KAKAO_ALLOWED_AUDIENCES:${KAKAO_AND_DEBUG_CLIENT_ID:}}

place:
  tour-api:
    base-url: ${TOUR_API_BASE_URL:https://apis.data.go.kr/B551011/KorService2}
    service-key: ${TOURISM_API_KEY:}
  google-places:
    base-url: ${GOOGLE_PLACES_BASE_URL:https://places.googleapis.com/v1/places}
    api-key: ${GOOGLE_PLACES_API_KEY:}