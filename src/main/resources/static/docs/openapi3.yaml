        - opaqueToken: []
      parameters:
        - $ref: "#/components/parameters/TravelId"
        - name: category
          in: query
          required: false
          description: 조회할 경비 카테고리
          schema:
            $ref: "#/components/schemas/ExpenseCategory"
        - name: from
          in: query
          required: false
          description: 조회 시작 일시. ISO-8601 date-time 형식입니다.
          schema:
            type: string
            format: date-time
          example: "2026-08-01T00:00:00"
        - name: to
          in: query
          required: false
          description: 조회 종료 일시. ISO-8601 date-time 형식입니다.
          schema:
            type: string
            format: date-time
          example: "2026-08-03T23:59:59"
        - name: payerUserId
          in: query
          required: false
          description: 결제자 사용자 ID
          schema:
            type: string
            format: uuid
          example: 50000000-0000-0000-0000-000000000001
        - name: page
          in: query
          required: false
          description: 페이지 번호. 0부터 시작합니다.
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
        - name: size
          in: query
          required: false
          description: 페이지 크기
          schema:
            type: integer
            minimum: 1
            default: 20
          example: 20
        - name: sort
          in: query
          required: false
          description: 정렬 조건. 기본값은 spentAt,desc 입니다.
          schema:
            type: string
          example: spentAt,desc
      responses:
        "200":
          description: 여행 경비 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelExpenseListResponse"
        "401":
          description: 인증이 필요합니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "403":
          description: 여행 멤버가 아닙니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "404":
          description: 여행을 찾을 수 없습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    post:
      tags:
        - TravelExpense
      summary: 여행 경비 등록
      description: |
        여행 멤버가 경비를 등록합니다.
        현재 등록 API는 참여자에게 금액을 균등 분할합니다.
        정산이 확정된 여행은 더 이상 경비를 등록할 수 없습니다.
      security:
        - opaqueToken: []
      parameters:
        - $ref: "#/components/parameters/TravelId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TravelExpenseCreateRequest"
            examples:
              equalSplit:
                summary: 균등 분할 경비 등록
                value:
                  title: 광안리 저녁 식사
                  amount: 60000
                  currency: KRW
                  category: FOOD
                  payerUserId: 50000000-0000-0000-0000-000000000001
                  participantUserIds:
                    - 50000000-0000-0000-0000-000000000001
                    - 50000000-0000-0000-0000-000000000002
                    - 50000000-0000-0000-0000-000000000003
                  spentAt: "2026-08-01T19:30:00"
                  memo: 회비로 결제
      responses:
        "201":
          description: 여행 경비 등록 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelExpenseCreateResponse"
        "400":
          description: 요청 값 검증에 실패했습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: 인증이 필요합니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "403":
          description: 여행 멤버가 아니거나 결제자/참여자가 여행 멤버가 아닙니다.
          content:
