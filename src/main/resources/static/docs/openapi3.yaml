openapi: 3.0.3
info:
  title: B-ting Backend API
  description: B-ting backend API documentation.
  version: 0.0.1-SNAPSHOT
servers:
  - url: https://api.buting.store
    description: Production server
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Auth
    description: Authentication APIs
  - name: User
    description: User APIs
  - name: Place
    description: Place search APIs
  - name: TravelSurvey
    description: Travel survey profile APIs
  - name: Travel
    description: 여행 생성 및 일정 관리 API
  - name: TravelTeam
    description: 여행 초대 및 멤버 관리 API
  - name: TravelExpense
    description: 여행 가계부 경비, 요약, 정산 API
  - name: Chat
    description: Chat APIs
  - name: WebSocket STOMP
    description: 웹소켓 연결 및 실시간 메시지 송수신 명세 가이드 (REST API가 아님)

paths:
  /api/v1/auth/oauth/login:
    post:
      tags:
        - Auth
      summary: 클라이언트 SSO 로그인
      description: |
        웹 클라이언트는 Google/Naver/Kakao SSO 로그인 후 받은 authorization code를 백엔드로 전달합니다.
        앱 클라이언트는 SDK에서 받은 Google/Kakao id_token을 providerToken으로 전달할 수 있습니다.
        백엔드는 authorization code를 각 provider token endpoint에서 교환하거나, id_token JWT 클레임의 audience(aud), issuer(iss), expiration(exp)을 검증합니다.
        Kakao 앱 id_token은 Kakao tokeninfo API로 1차 검증한 뒤, 백엔드에 등록된 client id와 aud가 일치하는 경우에만 인증 처리합니다.

        백엔드는 provider token을 검증하고, 기존 회원 조회/연결 또는 신규 회원 생성을 수행한 뒤 B-TING 전용 opaque access token을 발급합니다.
        Swagger 상단 Authorize로 기존 B-TING opaque token을 인증해두면, 같은 사용자이고 만료 전인 경우 기존 토큰을 재사용합니다.
        기존 토큰이 없거나 만료/폐기/다른 사용자 토큰이면 새 opaque token을 발급합니다.
      security:
        - opaqueToken: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthLoginRequest"
            examples:
              googleCode:
                summary: Google PKCE authorization code 로그인
                value:
                  provider: google
                  providerToken: GOOGLE_AUTHORIZATION_CODE
                  redirectUri: http://localhost:8080/login/oauth2/code/google
                  codeVerifier: GOOGLE_CODE_VERIFIER
              googleAppIdToken:
                summary: Google 앱 id_token 로그인
                value:
                  provider: google
                  providerToken: GOOGLE_APP_ID_TOKEN
              naverCode:
                summary: Naver PKCE authorization code 로그인
                value:
                  provider: naver
                  providerToken: code=NAVER_AUTHORIZATION_CODE&state=NAVER_STATE
                  redirectUri: http://localhost:8080/login/oauth2/code/naver
                  codeVerifier: NAVER_CODE_VERIFIER
              kakaoCode:
                summary: Kakao PKCE authorization code 로그인
                value:
                  provider: kakao
                  providerToken: KAKAO_AUTHORIZATION_CODE
                  redirectUri: http://localhost:8080/login/oauth2/code/kakao
                  codeVerifier: KAKAO_CODE_VERIFIER
              kakaoAppIdToken:
                summary: Kakao 앱 id_token 로그인
                value:
                  provider: kakao
                  providerToken: KAKAO_APP_ID_TOKEN
      responses:
        "200":
          description: OAuth login succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuth2LoginResponseEnvelope"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Provider token verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/v1/places:
    get:
      tags:
        - Place
      summary: 장소 목록 조회
      description: |
        한국관광공사 지역기반 관광정보(areaBasedList2)를 조회한 뒤, 프론트에서 필요한 장소 표시용 필드만 반환합니다.
        부산 법정동 시도 코드 `26`은 백엔드에서 고정으로 사용합니다.
        공공데이터 serviceKey, MobileOS, MobileApp, _type 값은 백엔드에서 관리합니다.
      parameters:
        - name: page
          in: query
          required: false
          description: 페이지 번호
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: size
          in: query
          required: false
          description: 한 페이지 결과 수
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: districtCode
          in: query
          required: false
          description: "부산 법정동 시군구 코드: 110 중구, 140 서구, 170 동구, 200 영도구, 230 부산진구, 260 동래구, 290 남구, 320 북구, 350 해운대구, 380 사하구, 410 금정구, 440 강서구, 470 연제구, 500 수영구, 530 사상구, 710 기장군"
          schema:
            type: string
            enum:
              - "110"
              - "140"
              - "170"
              - "200"
              - "230"
              - "260"
              - "290"
              - "320"
              - "350"
              - "380"
              - "410"
              - "440"
              - "470"
              - "500"
              - "530"
              - "710"
          example: "440"
        - name: contentTypeId
          in: query
          required: false
          description: "관광타입 ID: 12 관광지, 14 문화시설, 15 축제공연행사, 25 여행코스, 28 레포츠, 32 숙박, 38 쇼핑, 39 음식점"
          schema:
            type: string
            enum:
              - "12"
              - "14"
              - "15"
              - "25"
              - "28"
              - "32"
              - "38"
              - "39"
          example: "39"
        - name: arrange
          in: query
          required: false
          description: "정렬 구분: A 제목순, C 수정일순, D 생성일순, O 대표이미지 있는 제목순, Q 대표이미지 있는 수정일순, R 대표이미지 있는 생성일순"
          schema:
            type: string
            enum:
              - A
              - C
              - D
              - O
              - Q
              - R
            default: C
          example: C
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceSearchResponse"
  /api/v1/places/location:
    get:
      tags:
        - Place
      summary: 위치 기반 장소 목록 조회
      description: |
        한국관광공사 위치기반 관광정보(locationBasedList2)를 조회한 뒤, 프론트에서 필요한 장소 표시용 필드만 반환합니다.
        공공데이터 serviceKey, MobileOS, MobileApp, _type 값은 백엔드에서 관리합니다.
        mapX/mapY는 WGS84 경도/위도 좌표이며, radius는 meter 단위이고 최대 20,000m입니다.
      parameters:
        - name: page
          in: query
          required: false
          description: 페이지 번호
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: size
          in: query
          required: false
          description: 한 페이지 결과 수
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: mapX
          in: query
          required: true
          description: GPS X좌표, WGS84 경도 좌표
          schema:
            type: number
            format: double
            minimum: -180
            maximum: 180
          example: 129.160
        - name: mapY
          in: query
          required: true
          description: GPS Y좌표, WGS84 위도 좌표
          schema:
            type: number
            format: double
            minimum: -90
            maximum: 90
          example: 35.163
        - name: radius
          in: query
          required: true
          description: 거리 반경, meter 단위, 최대 20,000m
          schema:
            type: integer
            minimum: 1
            maximum: 20000
          example: 1000
        - name: contentTypeId
          in: query
          required: false
          description: "관광타입 ID: 12 관광지, 14 문화시설, 15 축제공연행사, 25 여행코스, 28 레포츠, 32 숙박, 38 쇼핑, 39 음식점"
          schema:
            type: string
            enum:
              - "12"
              - "14"
              - "15"
              - "25"
              - "28"
              - "32"
              - "38"
              - "39"
          example: "32"
        - name: arrange
          in: query
          required: false
          description: "정렬 구분: A 제목순, C 수정일순, D 생성일순, E 거리순, O 대표이미지 있는 제목순, Q 대표이미지 있는 수정일순, R 대표이미지 있는 생성일순, S 대표이미지 있는 거리순"
          schema:
            type: string
            enum:
              - A
              - C
              - D
              - E
              - O
              - Q
              - R
              - S
            default: E
          example: E
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceSearchResponse"
  /api/v1/places/festivals:
    get:
      tags:
        - Place
      summary: 행사 정보 목록 조회
      description: |
        한국관광공사 행사정보(searchFestival2)를 조회한 뒤, 요청한 행사 시작일/종료일 기준의 행사 목록을 반환합니다.
        부산 법정동 시도 코드 `26`은 백엔드에서 고정으로 사용합니다.
        eventStartDate는 공공데이터 필수값이며, eventEndDate는 선택값입니다.
      parameters:
        - name: eventStartDate
          in: query
          required: true
          description: 행사 시작일, YYYYMMDD
          schema:
            type: string
            pattern: "^\\d{8}$"
          example: "20260701"
        - name: eventEndDate
          in: query
          required: false
          description: 행사 종료일, YYYYMMDD
          schema:
            type: string
            pattern: "^\\d{8}$"
          example: "20260731"
        - name: page
          in: query
          required: false
          description: 페이지 번호
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: size
          in: query
          required: false
          description: 한 페이지 결과 수
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: districtCode
          in: query
          required: false
          description: "부산 법정동 시군구 코드: 110 중구, 140 서구, 170 동구, 200 영도구, 230 부산진구, 260 동래구, 290 남구, 320 북구, 350 해운대구, 380 사하구, 410 금정구, 440 강서구, 470 연제구, 500 수영구, 530 사상구, 710 기장군"
          schema:
            type: string
            enum:
              - "110"
              - "140"
              - "170"
              - "200"
              - "230"
              - "260"
              - "290"
              - "320"
              - "350"
              - "380"
              - "410"
              - "440"
              - "470"
              - "500"
              - "530"
              - "710"
          example: "350"
        - name: arrange
          in: query
          required: false
          description: "정렬 구분: A 제목순, C 수정일순, D 생성일순, O 대표이미지 있는 제목순, Q 대표이미지 있는 수정일순, R 대표이미지 있는 생성일순"
          schema:
            type: string
            enum:
              - A
              - C
              - D
              - O
              - Q
              - R
            default: C
          example: C
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FestivalSearchResponse"
  /api/v1/places/{contentId}/detail:
    get:
      tags:
        - Place
      summary: 장소 상세 정보 조회
      description: |
        한국관광공사 상세소개(detailIntro2)를 조회한 뒤, 콘텐츠 타입별 상세 필드를 반환합니다.
        공공데이터 serviceKey, MobileOS, MobileApp, _type 값은 백엔드에서 관리합니다.
        contentTypeId에 따라 응답 필드가 달라지므로 빈 값과 식별자 필드를 제외한 상세 값을 details 객체로 제공합니다.
        googleSearchText를 전달하면 해당 텍스트를 우선 사용해 Google Places 리뷰, 평점, 가격대, 운영시간을 조회합니다.
        googleSearchText가 없으면 관광공사 detailCommon2의 제목/주소를 fallback으로 사용합니다.
      parameters:
        - name: contentId
          in: path
          required: true
          description: 한국관광공사 콘텐츠 ID
          schema:
            type: string
          example: "2651318"
        - name: contentTypeId
          in: query
          required: true
          description: "관광타입 ID: 12 관광지, 14 문화시설, 15 축제공연행사, 25 여행코스, 28 레포츠, 32 숙박, 38 쇼핑, 39 음식점"
          schema:
            type: string
            enum:
              - "12"
              - "14"
              - "15"
              - "25"
              - "28"
              - "32"
              - "38"
              - "39"
          example: "32"
        - name: googleSearchText
          in: query
          required: false
          description: Google Places 검색에 사용할 장소명 또는 장소명+주소 텍스트입니다. 값이 있으면 관광공사 detailCommon2 조회 없이 이 텍스트로 Google 장소를 찾습니다.
          schema:
            type: string
          example: 파라다이스 호텔 부산
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaceDetailResponse"
  /api/v1/users/signup:
    post:
      tags:
        - User
      summary: 사용자 회원가입
      description: 인증된 B-TING opaque token을 확인한 뒤 이메일과 닉네임으로 사용자를 생성합니다.
      security:
        - opaqueToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
            example:
              email: test@example.com
              nickname: 테스터
              provider: google
              providerId: google-123
              firstName: 길동
              lastName: 홍
      responses:
        "201":
          description: Created
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/v1/users/me:
    get:
      tags:
        - User
      summary: 내 프로필 조회
      description: 로그인한 사용자의 프로필과 회원 정보를 조회합니다.
      security:
        - opaqueToken: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfileResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    patch:
      tags:
        - User
      summary: 내 회원 정보 수정
      description: 로그인한 사용자의 닉네임, 프로필 이미지, 이름 정보를 수정합니다.
      security:
        - opaqueToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyProfileRequest"
            example:
              nickname: 수정닉
              profileImageUrl: https://example.com/profile.png
              firstName: 길동
              lastName: 홍
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfileResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    delete:
      tags:
        - User
      summary: 회원 탈퇴
      description: 로그인한 사용자의 토큰과 회원 정보를 삭제합니다.
      security:
        - opaqueToken: []
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/v1/users/signin:
    get:
      tags:
        - User
      summary: 사용자 이메일 조회
      description: 이메일로 사용자 정보를 조회합니다. OAuth2 완료 전 임시 로그인/조회 API입니다.
      parameters:
        - name: email
          in: query
          required: true
          description: 조회할 사용자 이메일
          schema:
            type: string
            format: email
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/v1/travel-surveys:
    put:
      tags:
        - TravelSurvey
      summary: 여행 성향 설문 저장/수정
      description: |
        로그인한 사용자의 여행 성향 설문을 저장하거나 수정합니다.
        `skippedAll`이 `true`이면 성향 Boolean 값은 서버에서 모두 `null`로 처리됩니다.
      security:
        - opaqueToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TravelSurveyProfileRequest"
            example:
              preferredLanguage: ko
              isPlanned: true
              isRelaxed: false
              isSolo: true
              isLight: true
              isFamiliar: false
              purposes:
                - food
                - scenery
              skippedSteps:
                - 2
              skippedAll: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelSurveyProfileResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    get:
      tags:
        - TravelSurvey
      summary: 여행 성향 설문 조회
      description: 로그인한 사용자의 여행 성향 설문 데이터를 조회합니다.
      security:
        - opaqueToken: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelSurveyProfileResponse"
        "400":
          description: Survey profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/v1/chat/rooms/zone:
    get:
      tags:
        - Chat
      summary: 권역별 오픈채팅방 목록 조회
      description: 선택한 행정 권역(ChatZone)에 개설되어 있는 오픈채팅방 리스트를 조회합니다.
      parameters:
        - name: zone
          in: query
          required: true
