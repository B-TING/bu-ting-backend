components:
  parameters:
    TravelId:
      name: travelId
      in: path
      required: true
      description: 여행 ID
      schema:
        type: string
        format: uuid
      example: 10000000-0000-0000-0000-000000000001
    PlanId:
      name: planId
      in: path
      required: true
      description: 여행 일자 ID
      schema:
        type: string
        format: uuid
      example: 20000000-0000-0000-0000-000000000001
    PlanPlaceId:
      name: planPlaceId
      in: path
      required: true
      description: 세부 여행지 ID
      schema:
        type: string
        format: uuid
      example: 30000000-0000-0000-0000-000000000001
    TravelRecordId:
      name: travelRecordId
      in: path
      required: true
      description: 여행 기록 ID
      schema:
        type: string
        format: uuid
      example: 60000000-0000-0000-0000-000000000001
    TravelRecordPlaceId:
