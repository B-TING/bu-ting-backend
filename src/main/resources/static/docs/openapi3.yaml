                $ref: "#/components/schemas/ApiErrorResponse"
        "409":
          description: 정산이 이미 확정되어 경비를 등록할 수 없습니다.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
