openapi: 3.0.3
info:
  title: B-ting Backend API
  description: B-ting backend API documentation.
  version: 0.0.1-SNAPSHOT
servers:
  - url: http://localhost:8080
    description: Local server
tags:
  - name: Auth
    description: Authentication APIs
  - name: User
    description: User APIs
  - name: TravelSurvey
    description: Travel survey profile APIs
  - name: Chat
    description: Chat APIs
  - name: WebSocket STOMP
    description: 웹소켓 연결 및 실시간 메시지 송수신 명세 가이드 (REST API가 아님)

paths:
  /api/v1/auth/oauth/login:
    post:
      tags:
        - Auth
      summary: 클라이언트 SSO 로그인
      description: |
        클라이언트가 Google/Naver/Kakao SDK로 SSO 로그인 후 받은 provider token을 백엔드로 전달합니다.
        Google/Naver/Kakao는 provider token 또는 authorization code를 전달할 수 있습니다.
        백엔드는 provider token을 검증하고, 기존 회원 조회/연결 또는 신규 회원 생성을 수행한 뒤 B-TING 전용 opaque access token을 발급합니다.
        기존 B-TING opaque token을 Authorization 헤더로 함께 보내면, 같은 사용자이고 만료 전인 경우 기존 토큰을 재사용합니다.
        기존 토큰이 없거나 만료/폐기/다른 사용자 토큰이면 새 opaque token을 발급합니다.
      parameters:
        - name: Authorization
          in: header
          required: false
          description: 기존 B-TING opaque token. 같은 사용자이고 만료 전이면 재사용됩니다.
          schema:
            type: string
            example: Bearer existing-opaque-token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthLoginRequest"
            examples:
              google:
                summary: Google id_token 로그인
                value:
                  provider: google
                  providerToken: GOOGLE_ID_TOKEN
              googleCode:
                summary: Google PKCE authorization code 로그인
                value:
                  provider: google
                  providerToken: GOOGLE_AUTHORIZATION_CODE
                  redirectUri: http://localhost:8080/login/oauth2/code/google
                  codeVerifier: GOOGLE_CODE_VERIFIER
              naver:
                summary: Naver access_token 로그인
                value:
                  provider: naver
                  providerToken: NAVER_ACCESS_TOKEN
              naverCode:
                summary: Naver PKCE authorization code 로그인
                value:
                  provider: naver
                  providerToken: code=NAVER_AUTHORIZATION_CODE&state=NAVER_STATE
                  redirectUri: http://localhost:8080/login/oauth2/code/naver
                  codeVerifier: NAVER_CODE_VERIFIER
              kakao:
                summary: Kakao access_token 로그인
                value:
                  provider: kakao
                  providerToken: KAKAO_ACCESS_TOKEN
              kakaoCode:
                summary: Kakao PKCE authorization code 로그인
                value:
                  provider: kakao
                  providerToken: KAKAO_AUTHORIZATION_CODE
                  redirectUri: http://localhost:8080/login/oauth2/code/kakao
                  codeVerifier: KAKAO_CODE_VERIFIER
      responses:
        "200":
          description: OAuth login succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuth2LoginResponseEnvelope"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Provider token verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/v1/users/signup:
    post:
      tags:
        - User
      summary: 사용자 회원가입
      description: 이메일과 닉네임으로 사용자를 생성합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
            example:
              email: test@example.com
              nickname: 테스터
              provider: google
              providerId: google-123
              firstName: 길동
              lastName: 홍
      responses:
        "201":
          description: Created
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/v1/users/signin:
    get:
      tags:
        - User
      summary: 사용자 이메일 조회
      description: 이메일로 사용자 정보를 조회합니다. OAuth2 완료 전 임시 로그인/조회 API입니다.
      parameters:
        - name: email
          in: query
          required: true
          description: 조회할 사용자 이메일
          schema:
            type: string
            format: email
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/v1/travel-surveys:
    put:
      tags:
        - TravelSurvey
      summary: 여행 성향 설문 저장/수정
      description: |
        로그인한 사용자의 여행 성향 설문을 저장하거나 수정합니다.
        `skippedAll`이 `true`이면 성향 Boolean 값은 서버에서 모두 `null`로 처리됩니다.
      security:
        - opaqueToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TravelSurveyProfileRequest"
            example:
              preferredLanguage: ko
              isPlanned: true
              isRelaxed: false
              isSolo: true
              isLight: true
              isFamiliar: false
              purposes:
                - food
                - scenery
              skippedSteps:
                - 2
              skippedAll: false
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelSurveyProfileResponse"
        "400":
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
    get:
      tags:
        - TravelSurvey
      summary: 여행 성향 설문 조회
      description: 로그인한 사용자의 여행 성향 설문 데이터를 조회합니다.
      security:
        - opaqueToken: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelSurveyProfileResponse"
        "400":
          description: Survey profile not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/v1/chat/rooms:
    get:
      tags:
        - Chat
      summary: 권역별 오픈채팅방 목록 조회
      description: 선택한 행정 권역(ChatZone)에 개설되어 있는 오픈채팅방 리스트를 조회합니다.
      parameters:
        - name: zone
          in: query
          required: true
          description: 조회할 부산 지역 권역 코드 (이넘값)
          schema:
            type: string
            enum:
              - SUYEONG_NAMGU
              - HAEUNDAE_GIJANG
              - YEONGDO
              - CENTRAL_NORTH
              - OLD_DOWNTOWN
              - WESTERN_BUSAN
            example: SUYEONG_NAMGU
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LocalChatroomResponse"
        "400":
          description: Validation failed (권역 정보 누락 등)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/v1/chat/rooms/{roomId}/exit:
    post:
      tags:
        - Chat
      summary: 특정 오픈채팅방 퇴장 (나가기)
      description: 참여 중이던 오픈채팅방에서 나갑니다. 매핑 데이터는 Hard Delete되며, 방 인원수가 1 차감됩니다.
      security:
        - opaqueToken: []
      parameters:
        - name: roomId
          in: path
          required: true
          description: 퇴장할 채팅방 UUID
          schema:
            type: string
            format: uuid
            example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        "200":
          description: 채팅방 퇴장 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "채팅방 퇴장이 완료되었습니다."
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
  /api/v1/chat/rooms/{roomId}/enter:
    post:
      tags:
        - Chat
      summary: 채팅방 입장 및 과거 대화 내역 조회
      description: |
        사용자가 오픈채팅방에 진입할 때 호출합니다. 
        인증된 유저 정보를 기반으로 과거 최근 대화 내역 상위 50개를 최신순(내림차순) 정렬하여 반환합니다.
      security:
        - opaqueToken: [ ]
      parameters:
        - name: roomId
          in: path
          required: true
          description: 입장하고 과거 내역을 조회할 채팅방 UUID
          schema:
            type: string
            format: uuid
            example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
      responses:
        "200":
          description: 과거 대화 내역 조회 성공
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessageResponse"
        "400":
          description: 존재하지 않는 방 ID이거나 잘못된 요청
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
        "401":
          description: Unauthorized (만료되거나 누락된 Opaque 토큰)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"

  /websocket-guide/connect:
    get:
      tags:
        - 실시간 채팅 (WebSocket STOMP)
      summary: "[1] 웹소켓 연결 및 인증 가이드"
      description: |
        ### ▶ **Connection URL**
        `ws://localhost:8080/ws-stomp`
        
        ### ▶ **연결 시 필수 헤더(Headers)**
        - `Authorization`: `Bearer {Opaque_Token}`
        
        ※ STOMP `CONNECT` 프레임 요청 시 헤더에 토큰을 실어 보내야 인증이 완료됩니다.
      responses:
        "200":
          description: OK

  /websocket-guide/send:
    post:
      tags:
        - ⚡ 실시간 채팅 (WebSocket STOMP)
      summary: "[2] 채팅 메시지 발행 (SEND)"
      description: |
        ### ▶ **발행(Destination) 채널**
        `/pub/chat/message`

        ### ▶ **보낼 JSON 본문 (Payload)**
        ```json
        {
          "roomId": "3fa85f64-5717-4562-b3fc-2c963f66afa6",
          "content": "안녕하세요! 반갑습니다."
        }
        ```
      responses:
        "200":
          description: OK

  /websocket-guide/subscribe:
    get:
      tags:
        - ⚡ 실시간 채팅 (WebSocket STOMP)
      summary: "[3] 채팅방 메시지 구독 (SUBSCRIBE)"
      description: |
        ### ▶ **구독(Destination) 채널**
        `/sub/chat/room/{roomId}`

        ### ▶ **수신하게 될 실시간 JSON 데이터 형식**
        ```json
        {
          "messageId": "uuid-value",
          "roomId": "uuid-value",
          "userId": "uuid-value",
          "senderNickname": "홍길동",
          "content": "안녕하세요! 반갑습니다.",
          "createdAt": "2026-06-30T10:47:06"
        }
        ```
      responses:
        "200":
          description: OK
components:
  securitySchemes:
    opaqueToken:
      type: http
      scheme: bearer
      bearerFormat: opaque
  schemas:
    OAuthLoginRequest:
      type: object
      required:
        - provider
        - providerToken
      properties:
        provider:
          type: string
          description: 클라이언트 SSO provider
          enum:
            - google
            - naver
            - kakao
          example: google
        providerToken:
          type: string
          description: Google은 id_token 또는 authorization code, Naver/Kakao는 access_token 또는 authorization code를 전달합니다.
          example: GOOGLE_ID_TOKEN
        redirectUri:
          type: string
          format: uri
          description: Authorization code 발급 시 사용한 redirect_uri입니다. providerToken이 access token/id token이면 생략할 수 있습니다.
          example: http://localhost:8080/login/oauth2/code/google
        codeVerifier:
          type: string
          description: PKCE authorization code flow에서 사용한 code_verifier입니다. providerToken이 access token/id token이면 생략할 수 있습니다.
          example: GOOGLE_CODE_VERIFIER
    SignUpRequest:
      type: object
      required:
        - email
        - nickname
      properties:
        email:
          type: string
          format: email
          example: test@example.com
        nickname:
          type: string
          example: 테스터
        provider:
          type: string
          example: google
        providerId:
          type: string
          example: google-123
        firstName:
          type: string
          example: 길동
        lastName:
          type: string
          example: 홍
    UserResponse:
      type: object
      properties:
        email:
          type: string
          format: email
          example: test@example.com
        nickname:
          type: string
          example: 테스터
    TravelSurveyProfileRequest:
      type: object
      properties:
        preferredLanguage:
          type: string
          maxLength: 5
          default: ko
          example: ko
        isPlanned:
          type: boolean
          nullable: true
          description: "true: 계획적, false: 즉흥적"
          example: true
        isRelaxed:
          type: boolean
          nullable: true
          description: "true: 여유롭게, false: 빡빡하게"
          example: false
        isSolo:
          type: boolean
          nullable: true
          description: "true: 혼자 여행 선호, false: 동행 여행 선호"
          example: true
        isLight:
          type: boolean
          nullable: true
          description: "true: 가볍게, false: 많이 챙김"
          example: true
        isFamiliar:
          type: boolean
          nullable: true
          description: "true: 부산을 아는 편, false: 잘 모름"
          example: false
        purposes:
          type: array
          description: 여행 목적. PostgreSQL `varchar(30)[]`로 저장됩니다.
          items:
            type: string
            maxLength: 30
          example:
            - food
            - scenery
        skippedSteps:
          type: array
          description: 스킵한 설문 단계. PostgreSQL `integer[]`로 저장됩니다.
          items:
            type: integer
          example:
            - 2
        skippedAll:
          type: boolean
          default: false
          example: false
    TravelSurveyProfileResponse:
      allOf:
        - $ref: "#/components/schemas/TravelSurveyProfileRequest"
        - type: object
          properties:
            completedAt:
              type: string
              format: date-time
              nullable: true
              example: "2026-06-25T13:14:33"
            aiPromptContext:
              type: string
              nullable: true
              example: preferred_language=ko; purposes=food,scenery; planned=true; relaxed=false; solo=true; light=true; familiar=false
    ApiErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Email is required.
        data:
          nullable: true
    OAuth2LoginResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: OAuth2 login succeeded.
        data:
          $ref: "#/components/schemas/OAuth2LoginResponse"
    OAuth2LoginResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
          format: email
          description: OAuth provider가 제공한 사용자 이메일입니다. OAuth 로그인에서 필수입니다.
        nickname:
          type: string
        provider:
          type: string
          example: google
        loggedIn:
          type: boolean
          example: true
        emailRequired:
          type: boolean
          description: 이메일 추가 입력 필요 여부입니다. OAuth 로그인에서는 provider 이메일 제공이 필수이므로 항상 false입니다.
          example: false
        accessToken:
          type: string
          description: Opaque access token. Store securely on the client and send it as a Bearer token.
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          format: int64
          example: 1209600
    LocalChatroomResponse:
      type: object
      properties:
        roomId:
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        title:
          type: string
          example: "수영구/남구 친목 채팅방"
        description:
          type: string
          nullable: true
          example: "수영구와 남구 주민들을 위한 소통 공간입니다."
        chatZone:
          type: string
          enum:
            - SUYEONG_NAMGU
            - HAEUNDAE_GIJANG
            - JUNG_YEONGDO
          example: SUYEONG_NAMGU
        maxMembers:
          type: integer
          example: 100
        currentMembers:
          type: integer
          example: 14
        updatedAt:
          type: string
          format: date-time
          example: "2026-06-30T10:47:06Z"
    ChatMessageResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: 메시지 고유 식별자 ID (uuid)
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa3
        roomId:
          type: string
          format: uuid
          description: 채팅방 고유 UUID
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        userId:
          type: string
          format: uuid
          description: 메시지를 보낸 유저 고유 UUID
          example: d1234567-89ab-cdef-0123-456789abcdef
        senderNickname:
          type: string
          description: 보낸 유저의 닉네임
          example: "광안리보이"
        content:
          type: string
          description: 채팅 메시지 본문 내용
          example: "안녕하세요! 지난 대화들 확인하고 들어왔습니다."
        createdAt:
          type: string
          format: date-time
          description: 메시지 생성 일시 (ISO 8601 포맷)
          example: "2026-07-01T23:15:00Z"
